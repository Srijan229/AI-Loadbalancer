apiVersion: apps/v1
kind: Deployment
metadata:
  name: experiment-runner
  labels:
    app: experiment-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: experiment-runner
  template:
    metadata:
      labels:
        app: experiment-runner
    spec:
      containers:
        - name: experiment-runner
          image: ai-loadbalancer-experiment-runner:lab-v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8007
              name: http
          env:
            - name: PROJECT_ROOT
              value: /app
            - name: DASHBOARD_URL
              value: http://dashboard:8010
            - name: GATEWAY_URL
              value: http://gateway:8001
            - name: ORCHESTRATOR_URL
              value: http://orchestrator:8002
            - name: TIME_CONTROLLER_URL
              value: http://time-controller:8006
            - name: WORKER_ENDPOINTS
              value: worker-a=http://worker-a:8000,worker-b=http://worker-b:8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 6
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
