apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-collector
  labels:
    app: metrics-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-collector
  template:
    metadata:
      labels:
        app: metrics-collector
    spec:
      containers:
        - name: metrics-collector
          image: ai-loadbalancer-metrics-collector:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8004
              name: http
          env:
            - name: GATEWAY_URLS
              value: http://gateway:8001
            - name: WORKER_URLS
              value: http://worker-a:8000,http://worker-b:8000
            - name: COLLECTOR_POLL_SECONDS
              value: "2"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

