apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  labels:
    app: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: ai-loadbalancer-orchestrator:strategic-v5
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
              name: http
          env:
            - name: WORKER_URLS
              value: http://worker-a:8000,http://worker-b:8000
            - name: DEFAULT_MODE
              value: round_robin
            - name: METRICS_COLLECTOR_URL
              value: http://metrics-collector:8004
            - name: PREDICTOR_URL
              value: http://predictor:8003
            - name: HISTORICAL_FORECASTER_URL
              value: http://historical-forecaster:8005
            - name: TIME_CONTROLLER_URL
              value: http://time-controller:8006
            - name: PREDICTIVE_WEIGHT_SMOOTHING
              value: "0.35"
            - name: PREDICTIVE_WEIGHT_HYSTERESIS
              value: "0.08"
            - name: PREDICTIVE_MAX_WEIGHT_STEP
              value: "0.18"
            - name: PREDICTIVE_MIN_HEALTHY_WEIGHT
              value: "0.2"
            - name: PREDICTIVE_MAX_HEALTHY_WEIGHT
              value: "0.65"
            - name: PREDICTIVE_WEIGHT_QUANTIZATION
              value: "0.05"
            - name: PREDICTIVE_REBALANCE_INTERVAL_SECONDS
              value: "6"
            - name: PREDICTIVE_EMERGENCY_DELTA
              value: "0.22"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
