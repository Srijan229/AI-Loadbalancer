apiVersion: apps/v1
kind: Deployment
metadata:
  name: predictor
  labels:
    app: predictor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: predictor
  template:
    metadata:
      labels:
        app: predictor
    spec:
      containers:
        - name: predictor
          image: ai-loadbalancer-predictor:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
              name: http
          env:
            - name: METRICS_COLLECTOR_URL
              value: http://metrics-collector:8004
            - name: PREDICTOR_POLL_SECONDS
              value: "2"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
