apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-a
  labels:
    app: worker
    instance: worker-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
      instance: worker-a
  template:
    metadata:
      labels:
        app: worker
        instance: worker-a
    spec:
      containers:
        - name: worker
          image: ai-loadbalancer-worker:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: WORKER_ID
              value: worker-a
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

